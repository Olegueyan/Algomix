<!doctype html>
<html lang="fr">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Algomix - Popup Tags Manage</title><link rel="stylesheet" href="./common.css" /></head>
<body>
  <article class="phone"><div class="screen">
    <header class="header"><div class="title">Gestion des tags</div></header>
    <main class="content"></main>
    <div class="overlay"><div class="modal">
      <div class="modal-title">Tags de la fiche</div>
      <div class="modal-text">Ajouter, retirer ou créer des tags.</div>
      <div class="search-row"><input class="search" placeholder="Nouveau tag..." /><div class="btn">Ajouter</div></div>
      <div class="pill-row" style="margin-top:8px;"><span class="pill active">OLL</span><span class="pill active">2look</span><span class="pill">simple</span><span class="pill">CFOP</span><span class="pill">entraînement</span></div>
      <div class="row" style="margin-top:10px;"><div class="btn">Fermer</div><div class="btn primary">Sauvegarder</div></div>
    </div></div>
  </div></article>
</body>
</html>
