<!doctype html>
<html lang="fr">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Algomix - Popup Load Item</title><link rel="stylesheet" href="./common.css" /></head>
<body>
  <article class="phone"><div class="screen">
    <header class="header"><div class="title">Chargement</div></header>
    <main class="content"></main>
    <div class="overlay"><div class="modal">
      <div class="modal-title">Charger un algo ou un mélange</div>
      <div class="search-row"><input class="search" placeholder="Recherche collection / fiche / mélange..." /><div class="search-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></div></div>
      <div class="pill-row" style="margin-top:8px;"><span class="pill active">Tous</span><span class="pill">Algorithmes</span><span class="pill">Mélanges</span></div>
      <div class="pill-row" style="margin-top:6px;"><span class="pill active">OLL</span><span class="pill">PLL</span><span class="pill">rapide</span></div>
      <div class="item-list" style="margin-top:8px;">
        <div class="item"><div class="name">Fiche OLL Cas 01</div><div class="tag-pills"><span class="tag-pill">OLL</span><span class="tag-pill">simple</span></div><div class="mini-box-list"><div class="mini-box"><div class="mini-head"><div class="name">○ Algo A - R U R' U'</div></div></div><div class="mini-box"><div class="mini-head"><div class="name">● Algo B - F R U R' U' F'</div></div></div></div></div>
        <div class="item"><div class="name">Mélanges</div><div class="mini-box-list"><div class="mini-box"><div class="mini-head"><div class="name">○ Warmup OLL</div></div><div class="tag-pills"><span class="tag-pill">mélange</span><span class="tag-pill">OLL</span></div></div><div class="mini-box"><div class="mini-head"><div class="name">○ Sprint PLL</div></div><div class="tag-pills"><span class="tag-pill">PLL</span><span class="tag-pill">rapide</span></div></div></div></div>
      </div>
      <div class="row" style="margin-top:10px;"><div class="btn">Fermer</div><div class="btn primary">Charger sélection</div></div>
    </div></div>
  </div></article>
</body>
</html>
