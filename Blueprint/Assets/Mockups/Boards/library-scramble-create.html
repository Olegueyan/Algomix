<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algomix - Library Scramble Create</title>
  <link rel="stylesheet" href="./common.css" />
</head>
<body>
  <article class="phone"><div class="screen">
    <header class="header"><div class="title">Création de mélange</div></header>
    <main class="content">
      <section class="cube-stage fill-remaining"><img src="../../Images/Notations/Cube_Rotations/no_rotation.png" alt="Cube 3x3" /></section>

      <section class="card">
        <div class="card-title">Play du mélange chargé</div>
        <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:34%;"></div></div></div>
        <div class="controls" style="margin-top:8px;grid-template-columns:repeat(6,1fr);">
          <div class="control">Prev</div><div class="control">Next</div><div class="control active">x1.0</div><div class="control">Auto</div><div class="control">Loop</div><div class="control">Reset</div>
        </div>
        <div class="algo-string" style="margin-top:8px;"><span class="done">R U R'</span> <span class="last">U'</span> <span>F2 L U2 L' D</span></div>
      </section>

      <section class="card">
        <div class="card-title">Code mélange</div>
        <div class="algo-string">R U R' U' F2 L U2 L' D R2 F'</div>
        <div class="row" style="margin-top:8px;"><div class="btn">Charger un code</div><div class="btn ghost">Générer</div></div>
        <div class="btn primary" style="margin-top:6px;">Sauvegarder ce mélange</div>
      </section>
    </main>
    <nav class="bottom-nav" aria-label="Navigation principale">
      <div class="bottom-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg><span>Accueil</span></div>
      <div class="bottom-item active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg><span>Bibliothèque</span></div>
      <div class="bottom-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg><span>Timer</span></div>
      <div class="bottom-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.05 13a8 8 0 0 1 0 -2l-2.05 -1.5l2 -3.5l2.4 .5a8 8 0 0 1 1.7 -1l.35 -2.5h4l.35 2.5a8 8 0 0 1 1.7 1l2.4 -.5l2 3.5l-2.05 1.5a8 8 0 0 1 0 2l2.05 1.5l-2 3.5l-2.4 -.5a8 8 0 0 1 -1.7 1l-.35 2.5h-4l-.35 -2.5a8 8 0 0 1 -1.7 -1l-2.4 .5l-2 -3.5z"/><circle cx="12" cy="12" r="3"/></svg><span>Paramètres</span></div>
    </nav>
  </div></article>
</body>
</html>
