<!doctype html>
<html lang="fr">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Algomix - Popup Save Edit</title><link rel="stylesheet" href="./common.css" /></head>
<body>
  <article class="phone"><div class="screen">
    <header class="header"><div class="title">Édition</div></header>
    <main class="content"></main>
    <div class="overlay"><div class="modal">
      <div class="modal-title">Sauvegarder l'édition</div>
      <div class="modal-text">Ajouter à une fiche algo existante ou créer un nouveau mélange.</div>
      <div class="pill-row"><span class="pill active">Ajouter à une fiche</span><span class="pill">Créer un mélange</span></div>
      <div class="search-row" style="margin-top:8px;"><input class="search" placeholder="Rechercher une collection..." /><div class="search-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></div></div>
      <div class="item-list" style="margin-top:8px;">
        <div class="item"><div class="item-head"><div class="name">Collection OLL 2LOOK</div></div><div class="meta">2 fiches compatibles</div></div>
        <div class="item"><div class="item-head"><div class="name">Créer une collection à la volée</div><div class="btn">Créer</div></div></div>
      </div>
      <div class="row" style="margin-top:10px;"><div class="btn">Annuler</div><div class="btn primary">Sauvegarder</div></div>
    </div></div>
  </div></article>
</body>
</html>
