<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algomix - Library Sheet Preview</title>
  <link rel="stylesheet" href="./common.css" />
</head>
<body>
  <article class="phone">
    <div class="screen">
      <header class="header"><div class="title">OLL 2LOOK - Cas 01</div></header>
      <main class="content">
        <section class="card">
          <div class="card-title">Raccourcis</div>
          <div class="row"><div class="btn">Play</div><div class="btn">Édition</div></div>
        </section>

        <section class="card">
          <div class="row" style="margin-bottom:6px;"><div class="btn primary">Sauvegarder la fiche</div><div class="btn">Export PDF</div></div>
          <div class="btn ghost">Importer un code d'algo</div>
        </section>

        <section class="card">
          <div class="card-title">Ensembles d'algorithmes</div>
          <div class="algo-list">
            <div class="algo-block">
              <div class="name">Algorithme A</div>
              <div class="moves-grid">
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/R.png" alt="R" /><span>R</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/U.png" alt="U" /><span>U</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/R_prime.png" alt="R'" /><span>R'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/U_prime.png" alt="U'" /><span>U'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/R_prime.png" alt="R'" /><span>R'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/F.png" alt="F" /><span>F</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/R.png" alt="R" /><span>R</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/F_prime.png" alt="F'" /><span>F'</span></div>
              </div>
            </div>

            <div class="algo-block">
              <div class="name">Algorithme B</div>
              <div class="moves-grid">
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/F.png" alt="F" /><span>F</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/R.png" alt="R" /><span>R</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/U.png" alt="U" /><span>U</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/R_prime.png" alt="R'" /><span>R'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/U_prime.png" alt="U'" /><span>U'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/F_prime.png" alt="F'" /><span>F'</span></div>
              </div>
            </div>

            <div class="algo-block">
              <div class="name">Algorithme C</div>
              <div class="moves-grid">
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/L.png" alt="L" /><span>L</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/U2.png" alt="U2" /><span>U2</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/L_prime.png" alt="L'" /><span>L'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/U.png" alt="U" /><span>U</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/L.png" alt="L" /><span>L</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/U_prime.png" alt="U'" /><span>U'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/L_prime.png" alt="L'" /><span>L'</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/F2.png" alt="F2" /><span>F2</span></div>
                <div class="algo-move"><img src="../../Images/Notations/Face_Turns/R2.png" alt="R2" /><span>R2</span></div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Navigation principale">
        <div class="bottom-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg><span>Accueil</span></div>
        <div class="bottom-item active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg><span>Bibliothèque</span></div>
        <div class="bottom-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg><span>Timer</span></div>
        <div class="bottom-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.05 13a8 8 0 0 1 0 -2l-2.05 -1.5l2 -3.5l2.4 .5a8 8 0 0 1 1.7 -1l.35 -2.5h4l.35 2.5a8 8 0 0 1 1.7 1l2.4 -.5l2 3.5l-2.05 1.5a8 8 0 0 1 0 2l2.05 1.5l-2 3.5l-2.4 -.5a8 8 0 0 1 -1.7 1l-.35 2.5h-4l-.35 -2.5a8 8 0 0 1 -1.7 -1l-2.4 .5l-2 -3.5z"/><circle cx="12" cy="12" r="3"/></svg><span>Paramètres</span></div>
      </nav>
    </div>
  </article>
</body>
</html>
