<!doctype html>
<html lang="fr">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Algomix - Popup Reset Password</title><link rel="stylesheet" href="./common.css" /></head>
<body>
  <article class="phone"><div class="screen">
    <header class="header"><div class="title">Paramètres</div></header><main class="content"></main>
    <div class="overlay"><div class="modal">
      <div class="modal-title">Changer le mot de passe</div>
      <div class="auth-input"><input class="search" placeholder="Mot de passe actuel" /><div class="eye-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="2.5"/></svg></div></div>
      <div class="auth-input" style="margin-top:6px;"><input class="search" placeholder="Nouveau mot de passe" /><div class="eye-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="2.5"/></svg></div></div>
      <div class="auth-input" style="margin-top:6px;"><input class="search" placeholder="Confirmer le nouveau mot de passe" /><div class="eye-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="2.5"/></svg></div></div>
      <div class="row" style="margin-top:8px;"><div class="btn">Annuler</div><div class="btn primary">Mettre à jour</div></div>
    </div></div>
  </div></article>

</html>
